# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[output]
feature-depth = 1

# =============================================================================
# Advisories — check for known vulnerabilities
# =============================================================================
[advisories]
ignore = []

# =============================================================================
# Licenses — only allow known-good open source licenses
# =============================================================================
# This crate is LGPL-2.0-only (a faithful port of acarsdec's LGPL-2.0
# C source — see NOTICE). The dependency allowlist below is the set of
# permissive / weak-copyleft licenses that compose cleanly under
# LGPL-2.0 — every direct dep (`arrayvec`, `num-complex`, `serde_json`,
# `thiserror`, `tracing`, `clap`, `tracing-subscriber`, `hound`) is
# MIT or MIT/Apache; the wider set is allowed so a transitive bump
# doesn't trip the gate on, say, an ISC-licensed utility crate. GPL
# entries are deliberately absent: pulling a GPL dep into an
# LGPL-2.0-only crate would relicense the whole thing.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "LGPL-2.0-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0-or-later",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

# =============================================================================
# Bans — prevent unwanted or duplicate crates
# =============================================================================
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # No C TLS dependencies in this crate — it does no networking.
    { crate = "openssl", reason = "OpenSSL is disallowed in this crate" },
    { crate = "openssl-sys", reason = "OpenSSL is disallowed in this crate" },
    { crate = "native-tls", reason = "native-tls is disallowed; use rustls if needed" },
]
skip = []
skip-tree = []

# =============================================================================
# Sources — only allow crates from crates.io
# =============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
